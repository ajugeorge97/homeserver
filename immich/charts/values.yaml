immich:
  controllers:
    main:
      replicas: 1
      containers:
        main:
          resources:
            requests:
              cpu: "1"
            limits:
              cpu: "1"
          env:
            # Add the env vars to connect to your database here. - These are created automatically by CNPG
            DB_HOSTNAME:
              valueFrom:
                secretKeyRef:
                  name: immich-database-app
                  key: host
            DB_USERNAME:
              valueFrom:
                secretKeyRef:
                  name: immich-database-app
                  key: user
            DB_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: immich-database-app
                  key: password
            DB_DATABASE_NAME:
              valueFrom:
                secretKeyRef:
                  name: immich-database-app
                  key: dbname
  immich:
    persistence:
      library:
        existingClaim: immich-data-pvc
  valkey:
    enabled: true

  server:
    ingress:
      main:
        enabled: true
        annotations:
          # proxy-body-size is set to 0 to remove the body limit on file uploads
          nginx.ingress.kubernetes.io/proxy-body-size: "0"
        hosts:
          - host: immich.lan
            paths:
              - path: "/"
                service:
                  identifier: main

  machine-learning:
    enabled: true
    controllers:
      main:
        containers:
          main:
            resources:
              requests:
                cpu: "1"
                memory: "2Gi"
              limits:
                cpu: "1"
                memory: "2Gi"
            