jellyfin:

  image:
    repository: docker.io/jellyfin/jellyfin
    tag: "10.11.11"

  jellyfin:
    env:
      - name: LIBVA_DRIVER_NAME
        value: "iHD"
      - name: LIBVA_DRIVERS_PATH
        value: "/usr/lib/jellyfin-ffmpeg/lib/dri"
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
    supplementalGroups:
      - 44
      - 992
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    runAsNonRoot: true

  ingress:
    enabled: true
    className: traefik
    hosts:
      - host: jellyfin.lan
        paths:
          - path: /
            pathType: Prefix
      - host: jellyfin.ajugeorge.com
        paths:
          - path: /
            pathType: Prefix
  #for hardware acceleration to do: not working yet
  volumes:
    - name: dri
      hostPath:
        path: /dev/dri
        type: Directory
  volumeMounts:
    - name: dri
      mountPath: /dev/dri

  persistence:
    media:
      type: hostPath
      hostPath: "/data/jellyfin"

  resources:
    requests:
      memory: "2Gi"
      cpu: "500m"
    limits:
      memory: "4Gi"
      cpu: "4"
