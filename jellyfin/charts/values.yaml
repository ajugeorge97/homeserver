jellyfin:
  ingress:
    enabled: true
    hosts:
      - host: jellyfin.lan
        paths:
          - path: /
            pathType: Prefix

  persistence:
    media:
      type: hostPath
      hostPath: "/data/jellyfin"

  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "1Gi"
      cpu: "500m"
