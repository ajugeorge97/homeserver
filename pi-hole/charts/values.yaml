pihole:
  maxUnavailable: 0
  serviceWeb:
    type: ClusterIP

  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - "pihole.lan"
  serviceDns:
    loadBalancerIP: 192.168.178.25
    type: LoadBalancer

  # DNS1: "8.8.8.8"
  dnsmasq:
    enableCustomDnsMasq: true

    additionalHostsEntries:
      - 100.77.244.43 pihole.lan
      - 100.77.244.43 nextcloud.lan
      - 100.77.244.43 immich.lan
      - 100.77.244.43 homeassistant.lan